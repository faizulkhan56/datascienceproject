services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datascienceproject-web
    env_file:
      - .env
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
